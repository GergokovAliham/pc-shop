<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — CompShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon">🖥️</div>
            <span class="logo-text">CompShop</span>
        </div>
        <div class="user-info">
            <span id="userDisplay">Гость</span>
            <button id="logoutBtn" class="btn-logout" style="display: none;">Выйти</button>
            <a href="login.html" id="loginLink" class="btn-logout" style="background: #4a7db5;">Войти</a>
        </div>
    </header>

    <div class="container">
        <nav class="vertical-menu">
            <div class="menu-title">Навигация</div>
            <ul>
                <li><a href="index.html">🏠 Главная</a></li>
                <li><a href="register.html">📝 Регистрация</a></li>
                <li><a href="login.html">🔐 Вход</a></li>
                <li><a href="create_request.html">📋 Мои заявки</a></li>
            </ul>
        </nav>

        <main class="content">
            <h2>📝 Регистрация нового пользователя</h2>
            <div id="messageBox"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label>Логин (уникальный) *</label>
                    <input type="text" id="regLogin" required minlength="3" placeholder="Не менее 3 символов">
                    <div class="error-message" id="loginError"></div>
                </div>
                <div class="form-group">
                    <label>Пароль *</label>
                    <input type="password" id="regPassword" required minlength="6" placeholder="Минимум 6 символов">
                    <div class="error-message" id="passwordError"></div>
                </div>
                <div class="form-group">
                    <label>ФИО *</label>
                    <input type="text" id="regFullName" required placeholder="Иванов Иван Иванович">
                    <div class="error-message" id="fullnameError"></div>
                </div>
                <div class="form-group">
                    <label>Телефон *</label>
                    <input type="tel" id="regPhone" required placeholder="+7 (900) 123-45-67">
                    <div class="error-message" id="phoneError"></div>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="regEmail" required placeholder="example@mail.ru">
                    <div class="error-message" id="emailError"></div>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; padding: 14px;">Зарегистрироваться</button>
                <p style="margin-top: 20px; text-align: center;">Уже есть аккаунт? <a href="login.html">Войти</a></p>
            </form>
        </main>
    </div>

    <footer class="footer">
        © 2026 CompShop. Все права защищены. Учебный проект.
    </footer>

    <script src="script.js"></script>
</body>
</html>
