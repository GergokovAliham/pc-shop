<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — CompShop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon">🖥️</div>
            <span class="logo-text">CompShop</span>
        </div>
        <div class="user-info">
            <span id="userDisplay">Гость</span>
            <button id="logoutBtn" class="btn-logout" style="display: none;">Выйти</button>
            <a href="login.html" id="loginLink" class="btn-logout" style="background: #4a7db5;">Войти</a>
        </div>
    </header>

    <div class="container">
        <nav class="vertical-menu">
            <div class="menu-title">Навигация</div>
            <ul>
                <li><a href="index.html">🏠 Главная</a></li>
                <li><a href="register.html">📝 Регистрация</a></li>
                <li><a href="login.html">🔐 Вход</a></li>
                <li><a href="create_request.html">📋 Мои заявки</a></li>
            </ul>
        </nav>

        <main class="content">
            <h2>🔐 Вход в личный кабинет</h2>
            <div id="loginMessageBox"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Логин</label>
                    <input type="text" id="loginUsername" required placeholder="Введите логин">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" required placeholder="Введите пароль">
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; padding: 14px;">Войти</button>
                <p style="margin-top: 20px; text-align: center;">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
            </form>
        </main>
    </div>

    <footer class="footer">
        © 2026 CompShop. Все права защищены. Учебный проект.
    </footer>

    <script src="script.js"></script>
</body>
</html>
